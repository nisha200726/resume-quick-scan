# Application
spring.application.name=resumeiq-backend
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/resumeiq?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=resumeiq-super-secret-key-2024-do-not-share-in-production
jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

